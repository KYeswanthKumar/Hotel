<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Rooms | The Grand Hotel</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        if (!localStorage.getItem('isAuthenticated')) {
            window.location.href = 'login.html';
        }
    </script>
    <style>
        .results-header {
            padding: 120px 10% 40px;
            background-color: var(--dark);
            text-align: center;
        }
        .results-header h2 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .results-header p {
            color: #ddd;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <nav class="navbar" style="background: var(--dark);">
        <div class="logo">The Grand Hotel</div>
        <ul class="nav-links">
            <li><a href="index.html#home">Home</a></li>
            <li><a href="index.html#rooms">Rooms</a></li>
            <li><a href="index.html#amenities">Amenities</a></li>
            <li>
                <select id="currency-selector" onchange="changeCurrency()"
                    style="background:var(--dark); color:var(--light); border:1px solid var(--primary); border-radius:4px; padding:0.4rem; font-family:'Outfit'; outline:none; cursor:pointer;">
                    <option value="USD" data-symbol="$" data-rate="1">🇺🇸 USD ($)</option>
                    <option value="EUR" data-symbol="€" data-rate="0.92">🇪🇺 EUR (€)</option>
                    <option value="GBP" data-symbol="£" data-rate="0.79">🇬🇧 GBP (£)</option>
                    <option value="INR" data-symbol="₹" data-rate="83.50">🇮🇳 INR (₹)</option>
                    <option value="JPY" data-symbol="¥" data-rate="151.20">🇯🇵 JPY (¥)</option>
                    <option value="AUD" data-symbol="A$" data-rate="1.52">🇦🇺 AUD (A$)</option>
                    <option value="CAD" data-symbol="C$" data-rate="1.36">🇨🇦 CAD (C$)</option>
                    <option value="CHF" data-symbol="CHF" data-rate="0.91">🇨🇭 CHF (CHF)</option>
                    <option value="CNY" data-symbol="¥" data-rate="7.24">🇨🇳 CNY (¥)</option>
                    <option value="SEK" data-symbol="kr" data-rate="10.83">🇸🇪 SEK (kr)</option>
                    <option value="NZD" data-symbol="NZ$" data-rate="1.67">🇳🇿 NZD (NZ$)</option>
                    <option value="MXN" data-symbol="$" data-rate="16.50">🇲🇽 MXN ($)</option>
                    <option value="SGD" data-symbol="S$" data-rate="1.35">🇸🇬 SGD (S$)</option>
                    <option value="HKD" data-symbol="HK$" data-rate="7.83">🇭🇰 HKD (HK$)</option>
                    <option value="NOK" data-symbol="kr" data-rate="10.98">🇳🇴 NOK (kr)</option>
                    <option value="KRW" data-symbol="₩" data-rate="1350.0">🇰🇷 KRW (₩)</option>
                    <option value="TRY" data-symbol="₺" data-rate="32.0">🇹🇷 TRY (₺)</option>
                    <option value="RUB" data-symbol="₽" data-rate="92.5">🇷🇺 RUB (₽)</option>
                    <option value="BRL" data-symbol="R$" data-rate="5.12">🇧🇷 BRL (R$)</option>
                    <option value="ZAR" data-symbol="R" data-rate="18.7">🇿🇦 ZAR (R)</option>
                    <option value="AED" data-symbol="د.إ" data-rate="3.67">🇦🇪 AED (د.إ)</option>
                    <option value="SAR" data-symbol="﷼" data-rate="3.75">🇸🇦 SAR (﷼)</option>
                </select>
            </li>
            <li><a href="login.html">Sign In</a></li>
        </ul>
    </nav>

    <div class="results-header">
        <h2>Available Rooms</h2>
        <p id="search-summary">Loading your availability...</p>
    </div>

    <section id="floors-container" class="room-section" style="padding-top: 1rem; padding-bottom: 5rem;">
        <div style="text-align: center; color: var(--primary); padding: 50px;">
            <i class="fas fa-spinner fa-spin fa-3x"></i>
            <p style="margin-top:20px;">Fetching live availability from the hotel...</p>
        </div>
    </section>

    <div id="cart-widget" style="display:none; position:fixed; bottom:30px; right:30px; background:var(--primary); color:#000; padding:15px 25px; border-radius:30px; cursor:pointer; font-weight:bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index:100; transition: transform 0.3s;" onclick="window.location.href='payment.html'">
        <i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span> Room(s) - Proceed to Checkout
    </div>

    <footer>
        <div class="footer-content">
            <div class="logo">The Grand Hotel</div>
            <p>123 Luxury Avenue, Metropolis</p>
            <p>contact@grandhotel.com | +1 234 567 8900</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        const categoryData = {
            'Deluxe': { img: 'assets/deluxe_room.png', max: 2, icon: 'fa-user-friends', desc: 'Experience pure comfort in our beautifully appointed deluxe rooms.', price: 200 },
            'Suite': { img: 'assets/suite_room.png', max: 3, icon: 'fa-users', desc: 'Our spacious suites offer a separate living area and stunning panoramas.', price: 500 },
            'Family': { img: 'assets/hero_hotel.png', max: 4, icon: 'fa-users', desc: 'Perfect for families, featuring two interconnected bedrooms.', price: 800 },
            'Penthouse': { img: 'assets/dining_hero.png', max: 10, icon: 'fa-users', desc: 'The ultimate luxury group experience featuring private pool.', price: 3500 },
            'Party Hall': { img: 'assets/dining_hero.png', max: 50, icon: 'fa-glass-cheers', desc: 'Elegant party hall perfect for birthdays and intimate celebrations.', price: 5000 },
            'Banquet Hall': { img: 'assets/hero_hotel.png', max: 100, icon: 'fa-building', desc: 'Grand banquet hall designed for weddings and large corporate events.', price: 12000 },
            'Standard': { img: 'assets/deluxe_room.png', max: 2, icon: 'fa-bed', desc: 'A cozy, budget-friendly room with all essential amenities.', price: 50 },
            'Economy': { img: 'assets/deluxe_room.png', max: 1, icon: 'fa-bed', desc: 'Compact and affordable, perfect for solo travelers.', price: 40 }
        };

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const checkin = urlParams.get('checkin');
            const checkout = urlParams.get('checkout');
            const guests = parseInt(urlParams.get('guests') || '1');

            if (checkin && checkout) {
                document.getElementById('search-summary').innerText = `Showing availability for ${guests} Guest(s) from ${checkin} to ${checkout}`;
            }

            try {
                const res = await fetch(`http://localhost:8085/api/availability?checkIn=${checkin}&checkOut=${checkout}`);
                const data = await res.json();
                
                if (!data.available || !data.rooms || data.rooms.length === 0) {
                    document.getElementById('floors-container').innerHTML = `<h3 style="text-align:center; color:#fff; padding: 50px;">No rooms available for these dates.</h3>`;
                    return;
                }

                // Group by floor
                const floors = {};
                data.rooms.forEach(r => {
                    const floorNum = r.roomNumber.charAt(0);
                    if (!floors[floorNum]) floors[floorNum] = [];
                    // filter by guest count
                    if (categoryData[r.category] && categoryData[r.category].max >= guests) {
                        floors[floorNum].push(r);
                    }
                });

                const container = document.getElementById('floors-container');
                container.innerHTML = '';
                
                let hasResults = false;

                Object.keys(floors).sort().forEach(floorNum => {
                    const rooms = floors[floorNum];
                    if (rooms.length === 0) return;
                    hasResults = true;

                    // Create Floor Header
                    const floorHeader = document.createElement('h2');
                    floorHeader.style = "text-align: center; color: var(--primary); margin: 3rem 0 1.5rem; font-size: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; width: 50%; margin-left: auto; margin-right: auto;";
                    floorHeader.innerText = `Floor ${floorNum}`;
                    container.appendChild(floorHeader);

                    const grid = document.createElement('div');
                    grid.className = 'room-grid';

                    rooms.forEach(r => {
                        const cat = categoryData[r.category];
                        if (!cat) return;
                        
                        const cRate = parseFloat(localStorage.getItem('currencyRate') || '1');
                        const cSymbol = localStorage.getItem('currencySymbol') || '$';
                        const price = (cat.price * cRate).toFixed(0);

                        let currentCart = JSON.parse(localStorage.getItem('cartItems') || '[]');
                        let inCart = currentCart.some(i => i.roomNumber === r.roomNumber);
                        let btnHtml = inCart ? `<button class="btn-secondary" style="background-color:#e74c3c; color:#fff; border-color:#e74c3c;" onclick="addToCart('${r.roomNumber}', '${r.category}', ${cat.price}, this)">Remove from Cart</button>` : `<button class="btn-secondary" onclick="addToCart('${r.roomNumber}', '${r.category}', ${cat.price}, this)">Add to Cart</button>`;

                        const card = document.createElement('div');
                        card.className = 'room-card';
                        card.innerHTML = `
                            <div class="room-img" style="background-image: url('${cat.img}');"></div>
                            <div class="room-info">
                                <h3 style="font-size:1.6rem; color:var(--light);">Room ${r.roomNumber} <span style="font-size:1rem; color:#aaa; font-weight:normal;">| ${r.category}</span></h3>
                                <p style="color:var(--primary); font-weight:bold; margin-bottom:0.5rem;"><i class="fas ${cat.icon}"></i> Up to ${cat.max} Adults</p>
                                <p>${cat.desc}</p>
                                <div class="room-price">
                                    <span class="price">${cSymbol}${price}</span> / night
                                    ${btnHtml}
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                    
                    container.appendChild(grid);
                });

                if (!hasResults) {
                    container.innerHTML = `<h3 style="text-align:center; color:#fff; padding:50px;">No rooms available on any floor for ${guests} guests.</h3>`;
                }

            } catch(e) {
                document.getElementById('floors-container').innerHTML = `<h3 style="text-align:center; color:#e74c3c; padding:50px;">Error connecting to the hotel server.</h3>`;
            }
            updateCartWidget();
        });

        function addToCart(roomNumber, category, basePrice, btnEl) {
            const urlParams = new URLSearchParams(window.location.search);
            const checkin = urlParams.get('checkin');
            const checkout = urlParams.get('checkout');
            
            if(!checkin || !checkout) {
                alert("Missing dates. Please search again.");
                return;
            }

            let cart = JSON.parse(localStorage.getItem('cartItems') || '[]');
            const index = cart.findIndex(i => i.roomNumber === roomNumber);
            
            if(index > -1) {
                cart.splice(index, 1);
                localStorage.setItem('cartItems', JSON.stringify(cart));
                btnEl.innerHTML = 'Add to Cart';
                btnEl.style = '';
            } else {
                cart.push({ roomNumber, category, basePrice, checkin, checkout });
                localStorage.setItem('cartItems', JSON.stringify(cart));
                btnEl.innerHTML = 'Remove from Cart';
                btnEl.style.backgroundColor = '#e74c3c';
                btnEl.style.color = '#fff';
                btnEl.style.borderColor = '#e74c3c';
            }
            
            updateCartWidget();
        }

        function updateCartWidget() {
            let cart = JSON.parse(localStorage.getItem('cartItems') || '[]');
            const widget = document.getElementById('cart-widget');
            if (cart.length > 0) {
                document.getElementById('cart-count').innerText = cart.length;
                widget.style.display = 'block';
            } else {
                widget.style.display = 'none';
            }
        }
    </script>
</body>
</html>
