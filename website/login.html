<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | The Grand Hotel</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('assets/hero_hotel.png');
            background-size: cover;
            background-position: center;
            padding: 80px 20px 20px; /* offset for navbar */
        }
        
        .auth-card {
            background: rgba(18, 18, 18, 0.75);
            backdrop-filter: blur(15px);
            padding: 3rem;
            border-radius: 12px;
            border: 1px solid rgba(203, 160, 82, 0.3);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .auth-card h2 {
            color: var(--primary);
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
        }

        .auth-card p {
            color: var(--gray);
            margin-bottom: 2rem;
        }

        .auth-form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .auth-form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #ddd;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .auth-form-group input {
            width: 100%;
            padding: 1rem;
            background-color: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--light);
            border-radius: 4px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .auth-form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: rgba(0, 0, 0, 0.7);
        }

        .btn-auth {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            margin-top: 1rem;
        }

        .auth-links {
            margin-top: 2rem;
            font-size: 0.9rem;
        }

        .auth-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .auth-links a:hover {
            color: var(--light);
        }
    </style>
</head>
<body>
    <nav class="navbar" style="background: var(--dark);">
        <div class="logo">The Grand Hotel</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>

    <section class="auth-section">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p>Sign in to manage your bookings</p>
            
            <form id="login-form">
                <div class="auth-form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter your email" required>
                </div>
                <div class="auth-form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary btn-auth">Sign In</button>
            </form>
            
            <div class="auth-links">
                <p>Don't have an account? <a href="signup.html">Create one</a></p>
            </div>
        </div>
    </section>

    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // Mock login logic
            const btn = e.target.querySelector('button');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In...';
            setTimeout(() => {
                localStorage.setItem('isAuthenticated', 'true');
                window.location.href = 'index.html';
            }, 1000);
        });
    </script>
</body>
</html>
